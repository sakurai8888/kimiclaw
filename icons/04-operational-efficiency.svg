  <!-- Checkmark -->
  <circle cx="160" cy="60" r="15" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <path d="M153 60 L157 65 L167 55" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text Label -->
  <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Operational Efficiency</text>
