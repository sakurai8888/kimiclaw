<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="expGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Stylized person/customer -->
  <circle cx="100" cy="70" r="22" fill="url(#expGrad)" stroke="#3182ce" stroke-width="2"/>
  <path d="M100 95 L100 140" stroke="#2d3748" stroke-width="4" stroke-linecap="round"/>
  <path d="M100 105 L75 125" stroke="#2d3748" stroke-width="3" stroke-linecap="round"/>
  <path d="M100 105 L125 125" stroke="#2d3748" stroke-width="3" stroke-linecap="round"/>
  <path d="M100 140 L80 165" stroke="#2d3748" stroke-width="3" stroke-linecap="round"/>
  <path d="M100 140 L120 165" stroke="#2d3748" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Heart for engagement -->
  <path d="M140 145 C135 140 130 145 140 155 C150 145 145 140 140 145" fill="#e53e3e" stroke="#c53030" stroke-width="1"/>
  
  <!-- Digital elements -->
  <rect x="55" y="125" width="15" height="15" rx="2" fill="#4facfe" opacity="0.6"/>
  <rect x="140" y="110" width="12" height="12" rx="2" fill="#00f2fe" opacity="0.6"/>
  <rect x="60" y="85" width="10" height="10" rx="2" fill="#4facfe" opacity="0.4"/>
  
  <!-- Smile -->
  <path d="M92 75 Q100 82 108 75" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <text x="100" y="192" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#2d3748">Digital Customer Experience</text>
</svg>