<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="effGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Central gear -->
  <circle cx="100" cy="100" r="30" fill="url(#effGrad)" stroke="#276749" stroke-width="2"/>
  <circle cx="100" cy="100" r="15" fill="#ffffff" stroke="#276749" stroke-width="2"/>
  
  <!-- Gear teeth -->
  <rect x="95" y="60" width="10" height="15" rx="2" fill="#11998e"/>
  <rect x="95" y="125" width="10" height="15" rx="2" fill="#11998e"/>
  <rect x="60" y="95" width="15" height="10" rx="2" fill="#11998e"/>
  <rect x="125" y="95" width="15" height="10" rx="2" fill="#11998e"/>
  
  <rect x="70" y="70" width="10" height="10" rx="2" fill="#11998e" transform="rotate(45 75 75)"/>
  <rect x="120" y="70" width="10" height="10" rx="2" fill="#11998e" transform="rotate(45 125 75)"/>
  <rect x="70" y="120" width="10" height="10" rx="2" fill="#11998e" transform="rotate(45 75 125)"/>
  <rect x="120" y="120" width="10" height="10" rx="2" fill="#11998e" transform="rotate(45 125 125)"/>
  
  <!-- Orbiting elements -->
  <circle cx="50" cy="70" r="12" fill="#38ef7d" stroke="#276749" stroke-width="1.5"/>
  <path d="M44 70 L48 74 L56 66" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <circle cx="150" cy="70" r="12" fill="#38ef7d" stroke="#276749" stroke-width="1.5"/>
  <path d="M144 70 L148 74 L156 66" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <circle cx="150" cy="130" r="12" fill="#38ef7d" stroke="#276749" stroke-width="1.5"/>
  <path d="M144 130 L148 134 L156 126" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Connection lines -->
  <path d="M62 70 L80 85" stroke="#11998e" stroke-width="2" stroke-dasharray="4,2"/>
  <path d="M138 70 L120 85" stroke="#11998e" stroke-width="2" stroke-dasharray="4,2"/>
  <path d="M138 130 L120 115" stroke="#11998e" stroke-width="2" stroke-dasharray="4,2"/>
  
  <text x="100" y="192" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#2d3748">Operational Efficiency</text>
</svg>