  <circle cx="100" cy="100" r="90" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2"/>
  
  <!-- Main Gear -->
  <circle cx="100" cy="100" r="35" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="100" cy="100" r="20" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
  
  <!-- Gear Teeth -->
  <rect x="95" y="55" width="10" height="15" fill="#34495e" rx="2"/>
  <rect x="95" y="130" width="10" height="15" fill="#34495e" rx="2"/>
  <rect x="55" y="95" width="15" height="10" fill="#34495e" rx="2"/>
  <rect x="130" y="95" width="15" height="10" fill="#34495e" rx="2"/>
  
  <rect x="67" y="67" width="10" height="10" fill="#34495e" rx="2" transform="rotate(45 72 72)"/>
  <rect x="123" y="67" width="10" height="10" fill="#34495e" rx="2" transform="rotate(45 128 72)"/>
  <rect x="67" y="123" width="10" height="10" fill="#34495e" rx="2" transform="rotate(45 72 128)"/>
  <rect x="123" y="123" width="10" height="10" fill="#34495e" rx="2" transform="rotate(45 128 128)"/>
  
  <!-- Small Gear 1 -->
  <circle cx="60" cy="70" r="18" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <circle cx="60" cy="70" r="10" fill="#ecf0f1"/>
  
  <!-- Small Gear 2 -->
  <circle cx="140" cy="130" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
