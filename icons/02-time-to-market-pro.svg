<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Clock outline -->
  <circle cx="100" cy="95" r="50" fill="none" stroke="#2d3748" stroke-width="4"/>
  
  <!-- Clock center -->
  <circle cx="100" cy="95" r="5" fill="#2d3748"/>
  
  <!-- Speed arrow (clock hand) -->
  <path d="M100 95 L100 55" stroke="url(#speedGrad)" stroke-width="5" stroke-linecap="round"/>
  <path d="M100 95 L130 110" stroke="url(#speedGrad)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Speed lines -->
  <path d="M160 50 L175 35" stroke="#f5576c" stroke-width="4" stroke-linecap="round"/>
  <path d="M170 70 L188 60" stroke="#f5576c" stroke-width="3" stroke-linecap="round"/>
  <path d="M165 85 L182 80" stroke="#f5576c" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Lightning bolt for speed -->
  <polygon points="145,30 125,55 140,55 130,80 160,50 142,50" fill="#f5576c"/>
  
  <text x="100" y="192" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#2d3748">Time-to-Market</text>
</svg>